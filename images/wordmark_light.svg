<svg width="850" height="170" viewBox="64 76 850 170" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGlow" x1="170" y1="160" x2="1030" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF4F93" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#8B5CF6" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#11C5FF" stop-opacity="0.26"/>
    </linearGradient>
    <linearGradient id="brandGradient" x1="84" y1="166" x2="1112" y2="166" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF5E83"/>
      <stop offset="0.5" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <clipPath id="ascentialInsetClip" clipPathUnits="userSpaceOnUse">
      <text x="82" y="220" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="132" font-weight="700" letter-spacing="-5">Ascential</text>
    </clipPath>
    <linearGradient id="xaiFillGradient" x1="646" y1="166" x2="900" y2="166" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A855F7"/>
      <stop offset="0.52" stop-color="#7C6BFF"/>
      <stop offset="1" stop-color="#38C6FF"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-80%" width="140%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="wordShadow" x="-10%" y="-30%" width="130%" height="180%" color-interpolation-filters="sRGB">
      <fedropshadow dx="0" dy="0" stdDeviation="4" flood-color="#D79BFF" flood-opacity="0.14"/>
      <fedropshadow dx="0" dy="10" stdDeviation="12" flood-color="#020206" flood-opacity="0.42"/>
    </filter>
  </defs>

  <g font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="132" font-weight="700" letter-spacing="-5">
    
    <text x="82" y="220" fill="none" stroke="url(#brandGradient)" stroke-width="18" stroke-linejoin="round" clip-path="url(#ascentialInsetClip)">
      Ascential
    </text>
    <text x="82" y="220" fill="#000000">
      Ascential
    </text>

    
    <text x="646" y="220" font-size="138" letter-spacing="-6" fill="url(#xaiFillGradient)">
      xAI
    </text>
  </g>
</svg>
